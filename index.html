<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ EDGE — S&P 100 Scanner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #060f1e; color: #f0f9ff; font-family: Arial, sans-serif; padding: 20px 16px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  .logo { text-align: center; margin-bottom: 20px; }
  .logo-title { font-size: 32px; font-weight: 900; color: #0ea5e9; }
  .logo-sub { font-size: 11px; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
  .spy-bar { background: #0a1628; border: 1px solid #4ade80; border-radius: 12px; padding: 12px 18px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
  .spy-bar.halt { background: #1a0505; border-color: #f87171; }
  .spy-bar.warn { border-color: #fb923c; }
  .spy-left { display: flex; align-items: center; gap: 12px; }
  .spy-label { font-size: 13px; font-weight: 800; color: #94a3b8; }
  .spy-price { font-size: 20px; font-weight: 900; color: #f0f9ff; }
  .spy-pct { font-size: 14px; font-weight: 700; }
  .spy-status { font-size: 11px; }
  .spy-refresh { font-size: 10px; color: #334155; margin-top: 2px; }
  .halt-banner { background: #1a0505; border: 2px solid #f87171; border-radius: 14px; padding: 20px; margin-bottom: 20px; text-align: center; display: none; }
  .halt-banner.show { display: block; }
  .halt-title { font-size: 20px; font-weight: 900; color: #f87171; }
  .halt-sub { font-size: 13px; color: #94a3b8; margin-top: 6px; }
  textarea { width: 100%; height: 140px; background: #0a1628; border: 1px solid #1e3a5f; border-radius: 10px; color: #94a3b8; font-size: 12px; padding: 12px; font-family: monospace; resize: vertical; }
  .btn { width: 100%; padding: 14px; background: linear-gradient(135deg,#0ea5e9,#0284c7); border: none; border-radius: 10px; color: #fff; font-size: 16px; font-weight: 900; cursor: pointer; margin-top: 10px; margin-bottom: 24px; }
  .btn:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 24px; }
  .stat-box { background: #0a1628; border-radius: 10px; padding: 12px 14px; text-align: center; border: 1px solid #0f1f35; }
  .stat-label { font-size: 10px; color: #475569; text-transform: uppercase; margin-bottom: 4px; }
  .stat-val { font-size: 18px; font-weight: 900; }
  .no-picks { background: #120808; border: 1px solid #7f1d1d; border-radius: 14px; padding: 28px; text-align: center; color: #f87171; font-size: 18px; font-weight: 700; }
  .pick-card { background: linear-gradient(160deg,#0c2340,#0a1628); border-radius: 18px; padding: 24px; margin-bottom: 20px; border: 2px solid #1e3a5f; }
  .pick-card.top { border-color: #0ea5e9; }
  .pick-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .pick-rank { font-size: 10px; color: #0ea5e9; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
  .pick-sym { font-size: 56px; font-weight: 900; line-height: 1; margin-bottom: 8px; }
  .pick-meta { font-size: 12px; color: #7dd3fc; display: flex; flex-wrap: wrap; gap: 6px 12px; }
  .pick-score-label { font-size: 10px; color: #475569; text-transform: uppercase; }
  .pick-score { font-size: 44px; font-weight: 900; line-height: 1; }
  .pick-score-max { font-size: 10px; color: #475569; }
  .oco-box { background: #040d1a; border: 2px solid #22d3ee; border-radius: 12px; padding: 18px 20px; margin-bottom: 16px; }
  .oco-title { font-size: 10px; color: #22d3ee; font-weight: 700; text-transform: uppercase; margin-bottom: 14px; }
  .oco-prices { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .oco-cell { background: #051525; border-radius: 8px; padding: 12px 8px; text-align: center; }
  .oco-cell-label { font-size: 9px; color: #475569; text-transform: uppercase; margin-bottom: 6px; }
  .oco-cell-val { font-size: 22px; font-weight: 900; }
  .oco-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; border-top: 1px solid #0f2a3f; padding-top: 14px; }
  .oco-stat { text-align: center; }
  .oco-stat-label { font-size: 9px; color: #475569; text-transform: uppercase; margin-bottom: 4px; }
  .oco-stat-val { font-size: 14px; font-weight: 800; }
  .pick-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .rr-box { background: #040d1a; border-radius: 10px; padding: 12px 14px; }
  .rr-label { font-size: 9px; color: #475569; text-transform: uppercase; margin-bottom: 4px; }
  .rr-val { font-size: 22px; font-weight: 900; color: #fbbf24; }
  .exit-box { background: #040d1a; border-radius: 10px; padding: 12px 14px; font-size: 11px; color: #64748b; line-height: 1.6; }
  .exit-title { color: #22d3ee; font-weight: 700; font-size: 9px; text-transform: uppercase; margin-bottom: 4px; }
  .excl-btn { width: 100%; padding: 10px; background: #0a1628; border: 1px solid #1e3a5f; border-radius: 8px; color: #475569; font-size: 12px; cursor: pointer; margin-bottom: 8px; }
  .excl-list { background: #0a1628; border-radius: 12px; padding: 10px 14px; margin-bottom: 20px; display: none; }
  .excl-list.show { display: block; }
  .excl-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #0f172a; font-size: 12px; }
  .excl-sym { color: #f87171; font-weight: 700; min-width: 60px; }
  .excl-reason { color: #475569; }
</style>
</head>
<body>
<div class="wrap">

  <div class="logo">
    <div class="logo-title">⚡ EDGE</div>
    <div class="logo-sub">S&P 100 Swing Trade Scanner</div>
  </div>

  <div class="spy-bar" id="spyBar">
    <div class="spy-left">
      <div class="spy-label">SPY</div>
      <div class="spy-price" id="spyPrice">Loading...</div>
      <div class="spy-pct" id="spyPct"></div>
    </div>
    <div style="text-align:right">
      <div class="spy-status" id="spyStatus"></div>
      <div class="spy-refresh">Auto-refreshes every 60s</div>
    </div>
  </div>

  <div class="halt-banner" id="haltBanner">
    <div class="halt-title">🚨 NO TRADES TODAY</div>
    <div class="halt-sub">SPY is down more than 1% — system halt active. Stand down.</div>
  </div>

  <textarea id="csvInput" placeholder="Paste Barchart CSV here (include header row)..."></textarea>
  <button class="btn" id="analyzeBtn" onclick="analyze()">FIND THE TRADE →</button>

  <div id="statsRow" style="display:none">
    <div class="stats">
      <div class="stat-box"><div class="stat-label">Passed</div><div class="stat-val" id="statPassed" style="color:#4ade80">0</div></div>
      <div class="stat-box"><div class="stat-label">Eliminated</div><div class="stat-val" id="statElim" style="color:#f87171">0</div></div>
      <div class="stat-box"><div class="stat-label">Signal</div><div class="stat-val" id="statSignal">—</div></div>
    </div>
  </div>

  <div id="noPicks" style="display:none" class="no-picks">No Valid Setups Today — Sit Out</div>
  <div id="picksContainer"></div>

  <button class="excl-btn" id="exclBtn" style="display:none" onclick="toggleExcl()">Show Eliminated (<span id="exclCount">0</span>)</button>
  <div class="excl-list" id="exclList"></div>

</div>

<script>
const ACCOUNT = 25000;
let halted = false;
let exclShowing = false;
let lastExcluded = [];

// ---- SPY ----
async function fetchSPY() {
  const sources = [
    () => fetch('https://finnhub.io/api/v1/quote?symbol=SPY&token=demo').then(r=>r.json()).then(d=>({currentPrice:d.c,prevClose:d.pc,changePct:((d.c-d.pc)/d.pc)*100,halt:((d.c-d.pc)/d.pc)*100<=-1})),
    () => fetch('https://api.twelvedata.com/price?symbol=SPY&apikey=demo').then(r=>r.json()).then(d=>{ throw new Error('no prev'); }),
    async () => {
      const url = 'https://query1.finance.yahoo.com/v8/finance/chart/SPY?interval=1d&range=2d';
      const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(url));
      const json = await r.json();
      const meta = json.chart.result[0].meta;
      const currentPrice = meta.regularMarketPrice;
      const prevClose = meta.chartPreviousClose || meta.previousClose;
      const changePct = ((currentPrice - prevClose) / prevClose) * 100;
      return { currentPrice, prevClose, changePct, halt: changePct <= -1 };
    },
    async () => {
      const url = 'https://query1.finance.yahoo.com/v8/finance/chart/SPY?interval=1d&range=2d';
      const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url));
      const wrapper = await r.json();
      const json = JSON.parse(wrapper.contents);
      const meta = json.chart.result[0].meta;
      const currentPrice = meta.regularMarketPrice;
      const prevClose = meta.chartPreviousClose || meta.previousClose;
      const changePct = ((currentPrice - prevClose) / prevClose) * 100;
      return { currentPrice, prevClose, changePct, halt: changePct <= -1 };
    }
  ];
  for (const src of sources) {
    try {
      const d = await src();
      if (d && d.currentPrice && d.currentPrice > 0) { updateSPY(d); return; }
    } catch(e) { continue; }
  }
  document.getElementById('spyPrice').textContent = 'Unavailable';
  document.getElementById('spyStatus').textContent = 'SPY feed error';
  document.getElementById('spyStatus').style.color = '#f87171';
}

function updateSPY(d) {
  halted = d.halt;
  const pct = d.changePct;
  const color = pct <= -1 ? '#f87171' : pct < 0 ? '#fb923c' : '#4ade80';
  const bar = document.getElementById('spyBar');
  bar.className = 'spy-bar' + (halted ? ' halt' : pct < 0 ? ' warn' : '');
  bar.style.borderColor = color;
  document.getElementById('spyPrice').textContent = '$' + d.currentPrice.toFixed(2);
  document.getElementById('spyPct').textContent = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
  document.getElementById('spyPct').style.color = color;
  const statusEl = document.getElementById('spyStatus');
  if (halted) { statusEl.textContent = '🚨 TRADING HALTED'; statusEl.style.color = '#f87171'; }
  else if (pct < 0) { statusEl.textContent = 'Caution — negative market'; statusEl.style.color = '#fb923c'; }
  else { statusEl.textContent = 'Market OK'; statusEl.style.color = '#4ade80'; }
  document.getElementById('haltBanner').className = 'halt-banner' + (halted ? ' show' : '');
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = halted;
  btn.textContent = halted ? 'TRADING HALTED — SPY DOWN > 1%' : 'FIND THE TRADE →';
}

fetchSPY();
setInterval(fetchSPY, 60000);

// ---- CSV PARSING ----
function parseNum(v) {
  if (v === undefined || v === '' || v === 'N/A') return NaN;
  return parseFloat(String(v).replace(/,/g, ''));
}

function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return { picks: [], excluded: [] };
  const isTab = lines[0].includes('\t');
  function splitLine(line) {
    if (isTab) return line.split('\t').map(c => c.replace(/^"|"$/g, '').trim());
    const result = []; let cur = '', inq = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inq = !inq; }
      else if (ch === ',' && !inq) { result.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur.trim());
    return result;
  }
  const headers = splitLine(lines[0]);
  const ix = {};
  headers.forEach((h, i) => { ix[h.trim().replace(/^\uFEFF/, '')] = i; });
  function col(...names) { for (const n of names) if (ix[n] !== undefined) return ix[n]; return undefined; }
  const C = {
    sy: col('Symbol'), la: col('Latest','Last','Price'), hi: col('High'), lo: col('Low'),
    pr: col('Previous','Prev Close','PrevClose'), m2: col('20D MA','20MA','20-Day MA'),
    m5: col('50D MA','50MA','50-Day MA'), pl: col('Prev Low','PrevLow'),
    ph: col('Prev High','PrevHigh'), hw: col('52W High','52-Week High','52WkHigh'),
  };
  const picks = [], excluded = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitLine(lines[i]);
    const sy = cols[C.sy];
    if (!sy || !/^[A-Z.]{1,6}$/.test(sy)) continue;
    const la=parseNum(cols[C.la]),hi=parseNum(cols[C.hi]),lo=parseNum(cols[C.lo]);
    const pr=parseNum(cols[C.pr]),m2=parseNum(cols[C.m2]),m5=parseNum(cols[C.m5]);
    const pl=parseNum(cols[C.pl]),ph=parseNum(cols[C.ph]),hw=parseNum(cols[C.hw]);
    if (isNaN(la)||isNaN(pr)||isNaN(m2)||isNaN(m5)) continue;
    if (pr<=0){excluded.push({s:sy,r:'Invalid prev close'});continue;}
    const gp=((la-pr)/pr)*100, a2=((la-m2)/m2)*100, a5=((la-m5)/m5)*100;
    const d5=(hw&&hw>0)?((hw-la)/hw)*100:100;
    const en=!isNaN(ph)?Math.round((ph+0.05)*100)/100:la;
    const st=(lo&&lo>0)?Math.round((lo-0.10)*100)/100:Math.round(en*0.97*100)/100;
    const ri=Math.round((en-st)*100)/100;
    if(gp<0.5){excluded.push({s:sy,r:`Gap ${gp.toFixed(2)}% < 0.5%`});continue;}
    if(gp>3.5){excluded.push({s:sy,r:`Gap ${gp.toFixed(2)}% > 3.5%`});continue;}
    if(la<=m2){excluded.push({s:sy,r:`Below 20MA $${m2.toFixed(2)}`});continue;}
    if(la<=m5){excluded.push({s:sy,r:`Below 50MA $${m5.toFixed(2)}`});continue;}
    if(a2>18){excluded.push({s:sy,r:`${a2.toFixed(1)}% above 20MA`});continue;}
    if(d5<1.0){excluded.push({s:sy,r:`${d5.toFixed(1)}% below 52W high`});continue;}
    if(ri<=0){excluded.push({s:sy,r:'Invalid stop'});continue;}
    const ms=(a2>0&&a5>0)?30:(a2>0?15:0);
    const gs=gp>=2.0?20:gp>=1.0?15:10;
    const rs=gp>=1.5?15:gp>=0.75?10:8;
    const ps=(d5>=5&&d5<=15)?10:(d5>15&&d5<=25)?7:(d5<5?3:4);
    const tr=(hi&&lo)?(hi-lo):0, pr2=(ph&&pl)?(ph-pl):0;
    const re=(tr>0&&pr2>0)?tr/pr2:null;
    const res=re===null?0:re>=2?25:re>=1.5?20:re>=1.25?15:re>=1?10:5;
    const ts=ms+gs+rs+ps+res;
    const tg=Math.round((en+ri*1.5)*100)/100;
    const sh=Math.floor(ACCOUNT/en);
    const ml=Math.round(sh*ri*100)/100;
    const pf=Math.round(sh*(tg-en)*100)/100;
    const rr=Math.round(((tg-en)/ri)*10)/10;
    if(pf<400){excluded.push({s:sy,r:`Profit $${pf} < $400`});continue;}
    picks.push({sy,gp,a2,a5,d5,re,en,st,ri,tg,sh,ml,pf,rr,ts});
  }
  picks.sort((a,b)=>b.ts-a.ts);
  return {picks,excluded};
}

// ---- RENDER ----
function analyze() {
  const csv = document.getElementById('csvInput').value;
  if (!csv.trim()) { alert('Paste your CSV first!'); return; }
  const {picks, excluded} = parseCSV(csv);
  lastExcluded = excluded;
  exclShowing = false;

  document.getElementById('statsRow').style.display = 'block';
  document.getElementById('statPassed').textContent = picks.length;
  document.getElementById('statElim').textContent = excluded.length;
  const sig = document.getElementById('statSignal');
  sig.textContent = picks.length > 0 ? 'TRADE' : 'SIT OUT';
  sig.style.color = picks.length > 0 ? '#4ade80' : '#f87171';

  document.getElementById('noPicks').style.display = picks.length === 0 ? 'block' : 'none';

  const container = document.getElementById('picksContainer');
  container.innerHTML = '';
  const ranks = ['TOP PICK','#2 PICK','#3 PICK'];
  picks.slice(0,3).forEach((s,i) => {
    const card = document.createElement('div');
    card.className = 'pick-card' + (i===0?' top':'');
    card.innerHTML = `
      <div class="pick-header">
        <div>
          <div class="pick-rank">${ranks[i]}</div>
          <div class="pick-sym">${s.sy}</div>
          <div class="pick-meta">
            <span style="color:#4ade80;font-weight:700">+${s.gp.toFixed(2)}% gap</span>
            <span>+${s.a2.toFixed(1)}% above 20MA</span>
            <span>+${s.a5.toFixed(1)}% above 50MA</span>
            ${s.re?`<span>${s.re.toFixed(2)}x range</span>`:''}
            <span>${s.d5.toFixed(1)}% below 52W high</span>
          </div>
        </div>
        <div style="text-align:right;min-width:70px">
          <div class="pick-score-label">Score</div>
          <div class="pick-score" style="color:${i===0?'#0ea5e9':'#64748b'}">${s.ts}</div>
          <div class="pick-score-max">/ 100</div>
        </div>
      </div>
      <div class="oco-box">
        <div class="oco-title">OCO ORDER</div>
        <div class="oco-prices">
          <div class="oco-cell"><div class="oco-cell-label">BUY LIMIT</div><div class="oco-cell-val" style="color:#4ade80">$${s.en}</div></div>
          <div class="oco-cell"><div class="oco-cell-label">STOP LOSS</div><div class="oco-cell-val" style="color:#f87171">$${s.st}</div></div>
          <div class="oco-cell"><div class="oco-cell-label">TARGET</div><div class="oco-cell-val" style="color:#fbbf24">$${s.tg}</div></div>
        </div>
        <div class="oco-stats">
          <div class="oco-stat"><div class="oco-stat-label">Shares</div><div class="oco-stat-val">${s.sh}</div></div>
          <div class="oco-stat"><div class="oco-stat-label">Risk/Share</div><div class="oco-stat-val">$${s.ri}</div></div>
          <div class="oco-stat"><div class="oco-stat-label">Max Loss</div><div class="oco-stat-val" style="color:#f87171">-$${s.ml}</div></div>
          <div class="oco-stat"><div class="oco-stat-label">Max Profit</div><div class="oco-stat-val" style="color:#4ade80">+$${s.pf}</div></div>
        </div>
      </div>
      <div class="pick-footer">
        <div class="rr-box"><div class="rr-label">Reward:Risk</div><div class="rr-val">${s.rr}:1</div></div>
        <div class="exit-box">
          <div class="exit-title">Stop Management</div>
          <div class="stop-rules">
            <div class="stop-step"><span class="step-num">1</span><span class="step-body"><span class="step-label">NOW → Enter trade</span><br>Set stop at <span class="stop-val red">$${s.st}</span></span></div>
            <div class="stop-step"><span class="step-num">2</span><span class="step-body"><span class="step-label">When price hits <span class="stop-val yellow">$${Math.round(s.en*1.02*100)/100}</span> (+2%)</span><br>Move stop up to breakeven <span class="stop-val yellow">$${s.en}</span></span></div>
            <div class="stop-step"><span class="step-num">3</span><span class="step-body"><span class="step-label">Once above breakeven &amp; still climbing</span><br>Switch to trailing stop — set at <span class="stop-val blue">current price − $${s.ri}</span> &amp; raise it manually as price climbs</span></div>
            <div class="stop-rule hard-exit">⏰ Hard exit Thu 2:30 PM CT regardless</div>
          </div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  const exclBtn = document.getElementById('exclBtn');
  document.getElementById('exclCount').textContent = excluded.length;
  exclBtn.style.display = excluded.length > 0 ? 'block' : 'none';
  document.getElementById('exclList').className = 'excl-list';

  const exclListEl = document.getElementById('exclList');
  exclListEl.innerHTML = excluded.map(e => `
    <div class="excl-row"><span class="excl-sym">${e.s}</span><span class="excl-reason">${e.r}</span></div>
  `).join('');
}

function toggleExcl() {
  exclShowing = !exclShowing;
  const list = document.getElementById('exclList');
  const btn = document.getElementById('exclBtn');
  list.className = 'excl-list' + (exclShowing ? ' show' : '');
  btn.textContent = (exclShowing ? 'Hide' : 'Show') + ' Eliminated (' + lastExcluded.length + ')';
}
</script>
</body>
</html>
